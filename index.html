<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Prompt Studio</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: #102a43;
      background: #f0f4f8;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .app {
      width: min(900px, 100%);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 14px 30px rgba(16, 42, 67, 0.12);
      padding: 24px;
    }
    h1 { margin-top: 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    label { font-size: 0.9rem; font-weight: 600; display: block; margin-bottom: 6px; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #bcccdc;
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      box-sizing: border-box;
    }
    textarea { min-height: 125px; resize: vertical; }
    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: #0f609b;
    }
    button.secondary { background: #627d98; }
    .output {
      margin-top: 16px;
      background: #f7fafc;
      border: 1px solid #d9e2ec;
      border-radius: 12px;
      padding: 14px;
      white-space: pre-wrap;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Travel Prompt Studio</h1>
    <p>Create detailed prompts for AI trip planning, itinerary building, and destination research.</p>

    <div class="grid">
      <div>
        <label for="destination">Destination</label>
        <input id="destination" placeholder="e.g., Kyoto, Japan" />
      </div>
      <div>
        <label for="duration">Trip Duration</label>
        <input id="duration" placeholder="e.g., 7 days" />
      </div>
      <div>
        <label for="travelers">Travelers</label>
        <input id="travelers" placeholder="e.g., couple in their 30s" />
      </div>
      <div>
        <label for="budget">Budget Level</label>
        <select id="budget">
          <option>Budget</option>
          <option selected>Mid-range</option>
          <option>Luxury</option>
        </select>
      </div>
      <div>
        <label for="style">Travel Style</label>
        <select id="style">
          <option selected>Cultural</option>
          <option>Adventure</option>
          <option>Relaxed</option>
          <option>Food-focused</option>
          <option>Family-friendly</option>
          <option>Mixed</option>
        </select>
      </div>
      <div>
        <label for="season">Season / Dates</label>
        <input id="season" placeholder="e.g., October shoulder season" />
      </div>
    </div>

    <div style="margin-top:12px;">
      <label for="mustSee">Must-see spots or interests</label>
      <textarea id="mustSee" placeholder="e.g., temples, hidden cafes, day trip to Nara"></textarea>
    </div>

    <div class="actions">
      <button id="generateBtn">Generate Prompt</button>
      <button class="secondary" id="copyBtn">Copy</button>
      <button class="secondary" id="clearBtn">Clear</button>
    </div>

    <div id="output" class="output">Your generated prompt will appear here.</div>
  </main>

  <script>
    const byId = (id) => document.getElementById(id);

    function generatePrompt() {
      const destination = byId('destination').value.trim() || '[destination]';
      const duration = byId('duration').value.trim() || '[duration]';
      const travelers = byId('travelers').value.trim() || '[traveler type]';
      const budget = byId('budget').value;
      const style = byId('style').value;
      const season = byId('season').value.trim() || '[season/date range]';
      const mustSee = byId('mustSee').value.trim() || '[interests and must-see places]';

      const prompt = `You are an expert travel planner.
Create a practical, day-by-day itinerary for a ${duration} trip to ${destination} for ${travelers}.

Constraints and preferences:
- Budget level: ${budget}
- Travel style: ${style}
- Season or dates: ${season}
- Must-see priorities: ${mustSee}

Please include:
1) A day-by-day schedule (morning/afternoon/evening) with realistic pacing.
2) Neighborhood-aware routing to reduce transit time.
3) Estimated daily budget ranges for food, transport, attractions, and lodging.
4) Food recommendations (local specialties + one backup option each day).
5) A rainy-day alternative for each day.
6) A packing checklist tailored to this trip.
7) Safety tips and cultural etiquette notes relevant to the destination.

Output in clear markdown tables or bullet sections.`;

      byId('output').textContent = prompt;
    }

    byId('generateBtn').addEventListener('click', generatePrompt);

    byId('copyBtn').addEventListener('click', async () => {
      const text = byId('output').textContent;
      await navigator.clipboard.writeText(text);
      byId('copyBtn').textContent = 'Copied!';
      setTimeout(() => { byId('copyBtn').textContent = 'Copy'; }, 1200);
    });

    byId('clearBtn').addEventListener('click', () => {
      ['destination', 'duration', 'travelers', 'season', 'mustSee'].forEach((id) => byId(id).value = '');
      byId('budget').value = 'Mid-range';
      byId('style').value = 'Cultural';
      byId('output').textContent = 'Your generated prompt will appear here.';
    });
  </script>
</body>
</html>
